{% extends "zerofour/base.html" %}

{% block content %}
<section class="container box" style="max-width: 800px; margin: 0 auto; padding: 3em;">
    <header class="major" style="text-align: center;">
        <h2>Tabela Wyników (Scoreboard)</h2>
        <p>Zobacz, kto zdobył najwięcej punktów i prowadzi w rankingu!</p>
    </header>

    <div style="overflow-x: auto; margin-top: 2em;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background: #222; color: #fff; font-weight: bold;">
                    <th style="padding: 12px; border: 1px solid #444;">Pozycja</th>
                    <th style="padding: 12px; border: 1px solid #444;">Gracz</th>
                    <th style="padding: 12px; border: 1px solid #444;">Punkty</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="padding: 12px; border: 1px solid #444;">1</td>
                    <td style="padding: 12px; border: 1px solid #444;"><strong>admin</strong></td>
                    <td style="padding: 12px; border: 1px solid #444;">9999 pkt</td>
                </tr>
                {% if username and username != 'admin' %}
                <tr>
                    <td style="padding: 12px; border: 1px solid #444;">2</td>
                    <td style="padding: 12px; border: 1px solid #444;">{{ username }}</td>
                    <td style="padding: 12px; border: 1px solid #444;">0 pkt</td>
                </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
